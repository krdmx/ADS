services:
  caddy:
    image: caddy:2.10.2-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
      n8n:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    extra_hosts:
      - "api.localhost:host-gateway"
    environment:
      NODE_ENV: production
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      gotenberg:
        condition: service_started
      n8n:
        condition: service_started
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://pep:pep@postgres:5432/pep?schema=public
      N8N_WORKFLOW_WEBHOOK_URL: http://n8n:5678/webhook/generate-cv
      N8N_SUMMARY_WORKFLOW_WEBHOOK_URL: http://n8n:5678/webhook/generate-summary
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  postgres:
    image: postgres:16.9-alpine3.22
    command: ["postgres", "-c", "hba_file=/etc/postgresql/pg_hba.conf"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: pep
      POSTGRES_USER: pep
      POSTGRES_PASSWORD: pep
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 10

  n8n:
    build:
      context: .
      dockerfile: infra/n8n/Dockerfile
    restart: unless-stopped
    depends_on:
      gotenberg:
        condition: service_started
    environment:
      NODE_ENV: production
      N8N_HOST: n8n.localhost
      N8N_PROTOCOL: http
      N8N_PORT: 5678
      N8N_EDITOR_BASE_URL: http://n8n.localhost
      WEBHOOK_URL: http://n8n.localhost/
      N8N_BASIC_AUTH_ACTIVE: false
      N8N_ENCRYPTION_KEY: pep-local-n8n-encryption-key
      N8N_SECURE_COOKIE: false
      N8N_IMPORT_SEED: true
      N8N_IMPORT_CREDENTIALS: true
      GOOGLE_GEMINI_API_KEY: ${GOOGLE_GEMINI_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5678').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  gotenberg:
    image: gotenberg/gotenberg:8
    mem_limit: 256mb
    restart: unless-stopped

volumes:
  postgres_data:
